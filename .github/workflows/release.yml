name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        # Each target builds natively on its own runner. Cross-compiling is
        # impossible here because @opentui/core loads platform-specific native
        # submodules (@opentui/core-<platform>-<arch>) at runtime, and only the
        # runner's own submodule is installed.
        target:
          - { os: ubuntu-latest,     name: linux-x64,     ext: tar.gz, exe: lazyvec }
          - { os: ubuntu-24.04-arm,  name: linux-arm64,   ext: tar.gz, exe: lazyvec }
          - { os: macos-13,          name: darwin-x64,    ext: tar.gz, exe: lazyvec }
          - { os: macos-14,          name: darwin-arm64,  ext: tar.gz, exe: lazyvec }
          - { os: windows-latest,    name: windows-x64,   ext: zip,    exe: lazyvec.exe }
    env:
      TARGET_NAME: ${{ matrix.target.name }}
      TARGET_EXT: ${{ matrix.target.ext }}
      TARGET_EXE: ${{ matrix.target.exe }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        shell: bash
        run: |
          mkdir -p dist
          bun build ./src/index.tsx \
            --compile \
            --minify \
            --outfile "dist/$TARGET_EXE"

      - name: Package archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="lazyvec-${VERSION}-${TARGET_NAME}.${TARGET_EXT}"
          cd dist
          if [ "$TARGET_EXT" = "zip" ]; then
            7z a "../$ARCHIVE" "$TARGET_EXE" >/dev/null
          else
            tar -czf "../$ARCHIVE" "$TARGET_EXE"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.name }}
          path: lazyvec-*

  attach-assets:
    name: Attach assets to the Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256SUMS
        working-directory: artifacts
        run: sha256sum lazyvec-* > SHA256SUMS.txt

      # release-please already created the GitHub Release with notes; this
      # step just appends our prebuilt binaries + checksums to it.
      - name: Upload binaries to existing Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/lazyvec-*
            artifacts/SHA256SUMS.txt

  npm-publish:
    name: Publish to npm
    needs: attach-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # The npm/package.json version is already in sync at this commit
      # (release-please bumped it as part of the Release PR).
      - name: Publish (with provenance)
        working-directory: npm
        run: npm publish --access public --provenance
